<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280"
     font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif">
  <title>LTRS 经典光路示意图</title>
  <desc>激光器 → 扩束镜 → 二向色镜 → 高 NA 物镜 → 紧聚焦到细胞 → 背向拉曼散射 → Notch 滤波 → 光谱仪</desc>

  <defs>
    <!-- 激光束（半透明蓝色渐变） -->
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1565C0" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#1565C0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1565C0" stop-opacity="0"/>
    </linearGradient>
    <!-- 拉曼回光（半透明红色渐变） -->
    <linearGradient id="raman" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C62828" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#C62828" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C62828" stop-opacity="0"/>
    </linearGradient>
    <!-- 箭头标记 -->
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- 激光器 -->
  <rect x="20" y="100" width="90" height="40" rx="6"
        fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="65" y="124" text-anchor="middle" font-size="12" fill="#333">激光 λ=1064/785 nm</text>

  <!-- 扩束镜组 -->
  <circle cx="160" cy="120" r="8" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="160" y="102" text-anchor="middle" font-size="10" fill="#555">扩束</text>

  <!-- 二向色镜（45° 分光） -->
  <line x1="230" y1="60" x2="230" y2="180" stroke="#333" stroke-width="1.5"
        stroke-dasharray="3 3"/>
  <text x="248" y="76" font-size="11" fill="#333">DM</text>
  <text x="248" y="90" font-size="9"  fill="#666">二向色镜</text>

  <!-- 高 NA 物镜 -->
  <polygon points="290,80 380,110 380,130 290,160"
           fill="#E0F2F1" stroke="#00695C" stroke-width="1.5"/>
  <text x="335" y="124" text-anchor="middle" font-size="11" fill="#333">高 NA 物镜</text>
  <text x="335" y="138" text-anchor="middle" font-size="10" fill="#666">NA ≥ 1.0</text>

  <!-- 入射激光束（蓝色半透明） -->
  <rect x="100" y="116" width="190" height="9" fill="url(#beam)"/>
  <polygon points="380,107 460,93 460,147 380,133" fill="url(#beam)"/>

  <!-- 焦点 + 细胞 -->
  <circle cx="510" cy="120" r="22" fill="#FFECB3" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="510" y="124" text-anchor="middle" font-size="11" fill="#333">单细胞</text>

  <!-- 受力箭头（在细胞处） -->
  <line x1="510" y1="120" x2="510" y2="100"
        stroke="#1565C0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="490" y="92" font-size="10" fill="#1565C0" font-weight="600">F_grad</text>
  <line x1="510" y1="120" x2="540" y2="120"
        stroke="#C62828" stroke-width="2" marker-end="url(#arr)"/>
  <text x="548" y="124" font-size="10" fill="#C62828" font-weight="600">F_scat</text>

  <!-- 拉曼背散射回光（红色） -->
  <polygon points="460,93 380,107 380,133 460,147" fill="url(#raman)"/>

  <!-- Notch 滤波片 -->
  <rect x="210" y="190" width="40" height="20" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.2"/>
  <text x="230" y="204" text-anchor="middle" font-size="9" fill="#6A1B9A">Notch 滤波</text>

  <!-- 光谱仪 -->
  <rect x="100" y="190" width="100" height="40" rx="6"
        fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="150" y="214" text-anchor="middle" font-size="11" fill="#333">光谱仪 + CCD</text>

  <!-- 拉曼回光链路（DM 后向下） -->
  <line x1="230" y1="180" x2="230" y2="190" stroke="#C62828" stroke-width="2"/>
  <line x1="230" y1="210" x2="200" y2="210" stroke="#C62828" stroke-width="2"/>
</svg>

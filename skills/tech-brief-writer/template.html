<script>
// =====================================================================
// JS 框架（工具层 + 业务层）
// =====================================================================
// 架构（自下而上）：
//   工具层    initCanvas / niceTicks / drawAxes / withClip / drawLine  ← 不要改（业务无关）
//   业务层    CONFIG / 业务公式 / drawPanelX       ← 按演示主题替换
//   入口层    updateAll + 事件绑定 + 初始化        ← 不要改（除非扩展滑块机制）
// =====================================================================


// ─── CONFIG: 业务常量集中区 ─────────────────────────────────────────────
// 修改这里调整演示行为；不要把业务常量散落到各 drawPanelX 函数里
const CONFIG = {
  // 业务数据（如多档激光 / 多个样本 / 多个频率）
  SERIES: [
    { name: "532 nm", value: 532, color: "#e65100" },
    { name: "638 nm", value: 638, color: "#d32f2f" },
    { name: "785 nm", value: 785, color: "#6a1b9a" }
  ],

  // 滑块 id 清单（新增/删除滑块时同步改这里 + HTML）
  SLIDER_IDS: ["param1", "param2"],

  // 默认参数（初始加载时使用）
  DEFAULT_PARAMS: { param1: 50, param2: 1.0 }
};


// =====================================================================
// 工具层：高 DPI canvas + 自适应刻度 + 坐标轴绘制 + 裁剪
// =====================================================================
// 这些函数与业务无关，原样保留即可。修 bug 时优先看 SKILL.md §二反模式清单。


// 高 DPI canvas 初始化
// 关键：CSS 控制显示尺寸（width/height: 100%），物理像素 = css × dpr
// canvas.width/height 属性是物理像素，不在 CSS 中暴露
function initCanvas(canvas) {
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth;
  const cssH = canvas.clientHeight;
  if (cssW === 0 || cssH === 0) return;   // 布局还没准备好（canvas 绝对定位初始可能为 0）
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas._ctx = canvas.getContext("2d");
  canvas._dpr = dpr;
  canvas._cssW = cssW;
  canvas._cssH = cssH;
}


// niceTicks：1/2/5×10ⁿ 自适应步长 + 整数计数 + toFixed 规避浮点尾巴
// 返回 [{x, label}]：x 是数值（整数乘法保证精确），label 是字符串（统一小数位）
// 反模式 B 修复：i * step 在 step=0.2 时出 0.6000000000000001 → 改用 ni*niceNorm*mag
function niceTicks(xMin, xMax, targetCount) {
  const range = xMax - xMin;
  if (range <= 0) return [];
  const roughStep = range / Math.max(1, targetCount);
  const magLog = Math.floor(Math.log10(roughStep));         // 整数
  const norm   = roughStep / Math.pow(10, magLog);
  let niceNorm;                                             // 整数 1/2/5/10
  if      (norm < 1.5) niceNorm = 1;
  else if (norm < 3)   niceNorm = 2;
  else if (norm < 7)   niceNorm = 5;
  else                 niceNorm = 10;
  const mag = Math.pow(10, magLog);
  const decimals = Math.max(0, -magLog);                    // 统一小数位
  const ticks = [];
  const startN = Math.ceil(xMin / (niceNorm * mag));
  const endN   = Math.floor(xMax / (niceNorm * mag));
  for (let ni = startN; ni <= endN; ni++) {
    const x = ni * niceNorm * mag;                          // 整数×整数×10ⁿ，浮点干净
    ticks.push({ x: x, label: x.toFixed(decimals) });
  }
  return ticks;
}


// 画坐标轴 + 网格 + 标签，返回坐标变换函数 + plotArea
// 参数 noXTicks=true：跳过 X 网格竖线 + X 刻度文字（用于分类轴，如面板 B 的激光名）
// 返回值含 plotArea 字段（{top,bottom,left,right} 聚合，供 withClip 使用）
function drawAxes(ctx, dpr, w, h, xMin, xMax, yMin, yMax, xLabel, yLabel, yLog, noXTicks) {
  const left = 60, right = w - 30, top = 30, bottom = h - 60;

  // 每次重绘前重置 transform（避免 DPR 累积放大）
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  // 网格（横竖浅灰线）
  ctx.strokeStyle = "#f0f0f0";
  ctx.lineWidth = 1;
  ctx.beginPath();
  if (!noXTicks) {
    const xGridTicks = niceTicks(xMin, xMax, Math.max(3, Math.floor((right - left) / 50)));
    xGridTicks.forEach(t => {
      const px = left + (t.x - xMin) / (xMax - xMin) * (right - left);
      ctx.moveTo(px, top);
      ctx.lineTo(px, bottom);
    });
  }
  if (yLog) {
    const logMin = Math.log10(yMin);
    const logMax = Math.log10(yMax);
    for (let logY = Math.ceil(logMin); logY <= logMax; logY++) {
      const py = bottom - (logY - logMin) / (logMax - logMin) * (bottom - top);
      ctx.moveTo(left, py);
      ctx.lineTo(right, py);
    }
  } else {
    const yTicks = niceTicks(yMin, yMax, 5);
    yTicks.forEach(t => {
      const py = bottom - (t.x - yMin) / (yMax - yMin) * (bottom - top);
      ctx.moveTo(left, py);
      ctx.lineTo(right, py);
    });
  }
  ctx.stroke();

  // 主坐标轴（黑色实线）
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(left, top);
  ctx.lineTo(left, bottom);
  ctx.lineTo(right, bottom);
  ctx.stroke();

  // X 刻度文字（自适应密度：每个标签 ≥ 50 px）
  if (!noXTicks) {
    ctx.fillStyle = "#444";
    ctx.font = "11px system-ui";
    ctx.textAlign = "center";
    const xTicks = niceTicks(xMin, xMax, Math.max(3, Math.floor((right - left) / 50)));
    xTicks.forEach(t => {
      const px = left + (t.x - xMin) / (xMax - xMin) * (right - left);
      ctx.fillText(t.label, px, bottom + 15);
    });
  }

  // Y 刻度文字
  ctx.textAlign = "right";
  if (yLog) {
    const logMin = Math.log10(yMin);
    const logMax = Math.log10(yMax);
    for (let logY = Math.ceil(logMin); logY <= logMax; logY++) {
      const py = bottom - (logY - logMin) / (logMax - logMin) * (bottom - top);
      ctx.fillText("10^" + logY, left - 5, py + 4);
    }
  } else {
    const yTicks = niceTicks(yMin, yMax, 5);
    yTicks.forEach(t => {
      const py = bottom - (t.x - yMin) / (yMax - yMin) * (bottom - top);
      ctx.fillText(t.label, left - 5, py + 4);
    });
  }

  // 轴标签（X 横排 / Y 旋转 90°）
  ctx.font = "13px system-ui";
  ctx.fillStyle = "#333";
  ctx.textAlign = "center";
  ctx.fillText(xLabel, (left + right) / 2, h - 5);
  ctx.save();
  ctx.translate(15, (top + bottom) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = "center";
  ctx.fillText(yLabel, 0, 0);
  ctx.restore();

  // 返回坐标变换函数 + plotArea
  // plotArea 用于 withClip：限制数据绘制在坐标轴内部，防止数据超出 X/Y 范围画到轴外
  return {
    xToPx: x => left + (x - xMin) / (xMax - xMin) * (right - left),
    yToPx: y => {
      if (yLog) {
        return bottom - (Math.log10(Math.max(y, yMin)) - Math.log10(yMin)) /
               (Math.log10(yMax) - Math.log10(yMin)) * (bottom - top);
      }
      return bottom - (y - yMin) / (yMax - yMin) * (bottom - top);
    },
    top, bottom, left, right,
    plotArea: { top, bottom, left, right }
  };
}


// withClip：在 plotArea 内执行绘图操作，超出部分被 Canvas 自动裁剪
// 解决"数据超出坐标轴范围画到 Y 轴左侧"的通用缺陷
// 用法：
//   const { xToPx, yToPx, plotArea } = drawAxes(...);
//   withClip(ctx, plotArea, () => {
//     ctx.strokeStyle = "#1565c0";
//     ctx.beginPath();
//     for (...) { ctx.lineTo(xToPx(x), yToPx(y)); }
//     ctx.stroke();
//   });
// 注意：坐标轴、刻度文字、标注应在 withClip 外调用（不应被裁剪）
function withClip(ctx, plot, fn) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(plot.left, plot.top,
           plot.right - plot.left, plot.bottom - plot.top);
  ctx.clip();
  try { fn(); } finally { ctx.restore(); }
}


// 通用折线绘制（使用 drawAxes 返回的 xToPx/yToPx）
// 可选 plotArea 参数：传入则自动 withClip 包裹，防数据超出坐标轴
// 用法：
//   drawLine(ctx, xData, yData, xToPx, yToPx, opts);                    // 不 clip（向后兼容）
//   drawLine(ctx, xData, yData, xToPx, yToPx, opts, plotArea);          // 自动 clip
function drawLine(ctx, xData, yData, xToPx, yToPx, opts, plotArea) {
  const draw = () => {
    ctx.save();
    ctx.globalAlpha = opts.alpha ?? 1;
    ctx.strokeStyle = opts.color;
    ctx.lineWidth = opts.lineWidth ?? 1;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < xData.length; i++) {
      const X = xToPx(xData[i]);
      const Y = yToPx(yData[i]);
      if (!started) { ctx.moveTo(X, Y); started = true; }
      else ctx.lineTo(X, Y);
    }
    ctx.stroke();

    if (opts.fillTo !== undefined) {
      ctx.lineTo(xToPx(xData[xData.length - 1]), yToPx(opts.fillTo));
      ctx.lineTo(xToPx(xData[0]), yToPx(opts.fillTo));
      ctx.closePath();
      ctx.fillStyle = opts.fillColor || opts.color;
      ctx.globalAlpha = (opts.alpha ?? 1) * 0.18;
      ctx.fill();
    }
    ctx.restore();
  };
  if (plotArea) withClip(ctx, plotArea, draw);
  else draw();
}


// =====================================================================
// 业务层：业务公式 + 面板渲染
// =====================================================================
// 按演示主题替换。参考 SKILL.md §二反模式 A「物理公式简化陷阱」：
//   占比 / 归一化公式的分子分母不能共用项被约掉，否则会失去对某些参数的响应。


// 业务公式示例：高斯函数（替换为本演示实际需要的物理公式）
function gaussian(x, x0, width) {
  const sigma = width / 2.355;
  return Math.exp(-0.5 * Math.pow((x - x0) / sigma, 2));
}


// 面板 A：高斯曲线（param1 控制中心，演示线性 X 轴 + withClip 用法）
function drawPanelA() {
  const param1 = parseFloat(document.getElementById("param1").value);
  document.getElementById("param1-val").textContent = param1;

  const ctx = canvasA._ctx;
  const w = canvasA._cssW, h = canvasA._cssH;

  // 坐标范围：X 0-100，Y 0-1.1
  // drawAxes 返回 plotArea，供 withClip / drawLine 使用
  const { xToPx, yToPx, top, bottom, plotArea } = drawAxes(
    ctx, canvasA._dpr, w, h, 0, 100, 0, 1.1,
    "自变量 X", "因变量 Y", false
  );

  // 高斯曲线（param1 = 中心位置；宽度固定 20）
  // 用 drawLine 的 plotArea 参数自动 clip
  //   即使 param1 接近 0 或 100（曲线尾部超出 X 范围），也不会画到坐标轴外
  const xData = [], yData = [];
  for (let x = 0; x <= 100; x += 1) {
    xData.push(x);
    yData.push(gaussian(x, param1, 20));
  }
  drawLine(ctx, xData, yData, xToPx, yToPx,
    { color: "#1565c0", lineWidth: 3 }, plotArea);

  // 当前中心位置垂直虚线（不 clip，允许标注在 plotArea 顶部上方）
  ctx.strokeStyle = "#c62828";
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 3]);
  ctx.beginPath();
  ctx.moveTo(xToPx(param1), top);
  ctx.lineTo(xToPx(param1), bottom);
  ctx.stroke();
  ctx.setLineDash([]);

  // 标注中心值（不 clip，文字在 plotArea 顶部上方）
  ctx.fillStyle = "#c62828";
  ctx.font = "italic 12px system-ui";
  ctx.textAlign = "center";
  ctx.fillText("中心 = " + param1, xToPx(param1), top + 16);
}


// 面板 B：分类柱状图（param2 控制柱高缩放，演示 noXTicks=true 分类轴）
function drawPanelB() {
  const param2 = parseFloat(document.getElementById("param2").value);
  document.getElementById("param2-val").textContent = param2.toFixed(1);

  const ctx = canvasB._ctx;
  const w = canvasB._cssW, h = canvasB._cssH;

  // 坐标范围：X 是分类轴（用 0-SERIES.length 占位），Y 0-3
  const { xToPx, yToPx, top, bottom, left, right, plotArea } = drawAxes(
    ctx, canvasB._dpr, w, h, 0, CONFIG.SERIES.length, 0, 3,
    "分类轴（激光 / 样本 / 频率）", "数值（× param2）", false,
    true    // noXTicks=true：分类轴，跳过数字刻度，由本函数自己画类目名
  );

  // 柱子（按 CONFIG.SERIES 循环）
  // 柱子用 fillRect，用 withClip 包裹防止柱顶超出 Y 轴上限时画到坐标轴外
  const barW = 0.5;
  withClip(ctx, plotArea, () => {
    CONFIG.SERIES.forEach((s, i) => {
      const cx = i + 0.5;
      const height = (s.value / 300) * param2;       // 占位公式，替换为实际计算
      const py = yToPx(height);

      ctx.fillStyle = s.color;
      ctx.fillRect(xToPx(cx - barW / 2), py,
                   xToPx(cx + barW / 2) - xToPx(cx - barW / 2), bottom - py);
    });
  });

  // 类目名 + 数值标注（不 clip，文字在 X 轴下方 / 柱顶上方）
  CONFIG.SERIES.forEach((s, i) => {
    const cx = i + 0.5;
    const height = (s.value / 300) * param2;
    const py = yToPx(height);

    ctx.fillStyle = "#444";
    ctx.font = "12px system-ui";
    ctx.textAlign = "center";
    ctx.fillText(s.name, xToPx(cx), bottom + 18);

    ctx.fillStyle = "#222";
    ctx.font = "bold 13px system-ui";
    ctx.fillText(height.toFixed(2), xToPx(cx), py - 8);
  });
}


// =====================================================================
// 入口层：更新 + 事件绑定 + 初始化
// =====================================================================

const canvasA = document.getElementById("panelA");
const canvasB = document.getElementById("panelB");


// 更新入口（所有滑块 input → 重绘全部面板）
function updateAll() {
  if (canvasA._ctx) drawPanelA();
  if (canvasB._ctx) drawPanelB();
}


// ResizeObserver：监听 .demo-canvas-wrap（不是 canvas 本身）
// 移动端旋转 / 虚拟键盘 / 侧栏折叠都不会触发 window.resize，必须用 ResizeObserver
function setupResizeObserver() {
  if (typeof ResizeObserver === "undefined") {
    // 降级方案
    window.addEventListener("resize", () => {
      initCanvas(canvasA);
      initCanvas(canvasB);
      updateAll();
    });
    return;
  }
  const ro = new ResizeObserver(() => {
    initCanvas(canvasA);
    initCanvas(canvasB);
    updateAll();
  });
  // 监听 canvas 父容器（.demo-canvas-wrap），容器尺寸变化时重新适配
  ro.observe(canvasA.parentElement);
  ro.observe(canvasB.parentElement);
}


// 等一帧确保布局完成（canvas 在 wrapper 内绝对定位，初始 clientWidth/Height 可能为 0）
requestAnimationFrame(() => {
  initCanvas(canvasA);
  initCanvas(canvasB);
  setupResizeObserver();
  updateAll();
});


// 滑块事件绑定（基于 CONFIG.SLIDER_IDS，自动适配新增/删除滑块）
CONFIG.SLIDER_IDS.forEach(id => {
  document.getElementById(id).addEventListener("input", updateAll);
});
</script>
